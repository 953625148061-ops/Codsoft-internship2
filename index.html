<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz Maker Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        
        <div class="quiz-card">
            
            <div class="quiz-meta">
                <p id="progress">QUESTION 1/10</p>
                <p id="timer" class="hidden">00:30</p> 
            </div>

            <div id="playArea" class="hidden">
                <h1 id="questionText">Welcome to the Online Quiz Maker Platform!</h1>
                <div class="options-grid">
                    <button class="option-btn" onclick="selectOption(0)">A. 3 times or more per week</button>
                    <button class="option-btn selected" onclick="selectOption(1)">B. 1 or 2 times per week</button>
                    <button class="option-btn" onclick="selectOption(2)">C. Less than 4 times per month</button>
                    <button class="option-btn" onclick="selectOption(3)">D. I don't practice sport during the month</button>
                </div>
                <div class="actions">
                    <button class="nav-btn prev hidden" onclick="prevQuestion()">Previous</button>
                    <button class="nav-btn next" onclick="nextQuestion()">Next</button>
                </div>
            </div>

            <div id="homeArea">
                <h1 class="welcome-msg">Welcome to Online Quiz Platform!</h1>
                <p class="desc-msg">Share and challenge knowledge.</p>
                <div class="home-actions">
                    <button class="home-btn create" onclick="alert('Creating Feature Ready!')">➕ Quiz Create பண்ண</button>
                    <button class="home-btn take" onclick="startQuiz()">▶️ Quiz Attend பண்ண</button>
                </div>
            </div>

        </div>

        <div class="site-footer">
            <div class="user-info">
                <span>Guest User</span>
                <button class="auth-btn">Login</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
